version: "3.9"

services:
  django:
    build: ./django_service
    restart: on-failure
    env_file:
      - ./django_service/.env
    environment:
      REDIS_URL: redis://redis:6379/1
      RABBITMQ_HOST: rabbitmq
    volumes:
      - ./django_service:/app
    command: >
      sh -c "sleep 5 && python manage.py migrate && 
             python manage.py runserver 0.0.0.0:8000"
    depends_on:
      - mysql_db
      - redis
      - rabbitmq
    networks:
      - veggie_net

  rag_api:
    build:
      context: ./chatbot
      dockerfile: Dockerfile
    env_file:
      - ./chatbot/.env
    depends_on:
      - mysql_db
      - qdrant_db
    volumes:
      - ./chatbot/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - veggie_net

  qdrant_db:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped
    networks:
      - veggie_net

  dotnet:
    build: ./dotnet_service
    restart: on-failure
    depends_on:
      - mysql_db
    networks:
      - veggie_net

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - django
      - dotnet
      - rag_api
    networks:
      - veggie_net

  mysql_db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: veggie_db
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - veggie_net

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - veggie_net
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=veggie_user
      - RABBITMQ_DEFAULT_PASS=veggie_password
    env_file:
      - ./django_service/.env
    networks:
      - veggie_net

networks:
  veggie_net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  qdrant_storage:
