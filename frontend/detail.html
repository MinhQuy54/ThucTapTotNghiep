<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veggie - Demo Vegetable Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <style>
        #pagination {
            display: flex;
            gap: 8px;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
        }

        .page-btn {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #eee;
            background-color: #fff;
            color: #333;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .page-btn.active {
            background-color: #8cb43c;
            color: white;
            border-color: #8cb43c;
        }

        .page-btn:hover:not(.active) {
            border-color: #8cb43c;
            color: #8cb43c;
        }

        .page-btn i {
            font-size: 0.9rem;
        }

        .product-image-wrapper:hover img {
            transform: scale(1.08);
        }

        .qty-container {
            border-radius: 30px;
            padding: 2px 8px;
        }

        .qty-container input::-webkit-outer-spin-button,
        .qty-container input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .btn-add-to-cart {
            background-color: #89b500;
            color: #000;
            border: none;
            position: relative;
            z-index: 1;
            overflow: hidden;
            transition: color 0.4s linear;
            cursor: pointer;
            padding: 10px 20px;
            text-transform: uppercase;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-add-to-cart:hover {
            color: #000 !important;
            border: 1px solid #000;
        }

        .btn-add-to-cart::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            z-index: -1;
            transition: transform 0.5s;
            transform-origin: 0 0;
            transform: scaleX(0);
            transition-timing-function: cubic-bezier(0.5, 1.6, 0.4, 1.7);
        }

        .btn-add-to-cart:hover::before {
            transform: scaleX(1);
        }

        .stock-status {
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 50px;
            background: #f0f9eb;
            color: #89b500;
        }

        .wishlist-btn {
            color: #666;
            transition: all 0.3s ease;
        }

        /* Khi có class .active (đã nằm trong danh sách yêu thích) */
        .wishlist-btn.active {
            color: #ff0000; /* Màu đỏ */
        }

        /* Hiệu ứng khi di chuột vào */
        .wishlist-btn:hover {
            color: #ff0000;
        }
    </style>
</head>

<body>
    <div id="header"></div>

    <div class="modal fade" id="successModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title">Thêm thành công!</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center">
                    <img id="success-product-img" src="" alt="Product" class="img-fluid mb-3" style="max-height: 150px; object-fit: contain;">
                    <h5 id="success-product-name" class="fw-bold text-success"></h5>
                    <p class="text-muted mt-2">Sản phẩm đã được thêm vào giỏ hàng.</p>
                </div>
                <div class="modal-footer justify-content-center">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Tiếp tục mua sắm</button>
                    <a href="cart.html" class="btn btn-success">Xem giỏ hàng</a>
                </div>
            </div>
        </div>
    </div>

    <main>
        <section class="py-5 bg-light">
            <div class="container">
                <div class="row">
                    <aside class="col-lg-3 ">
                        <div class="filter-sidebar bg-white p-4 rounded shadow-sm">
                            <h5 class="fw-bold mb-4 border-bottom pb-2">Filter By</h5>
                            <div class="filter-group mb-4">
                                <h6 class="fw-bold">Availability</h6>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="stockStatus" id="stockAll" value="all" checked>
                                    <label class="form-check-label" for="stockAll">All (Tất cả)</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="stockStatus" id="stock1" value="inStock">
                                    <label class="form-check-label" for="stock1">In Stock</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="stockStatus" id="stock2" value="outOfStock">
                                    <label class="form-check-label" for="stock2">Out of Stock</label>
                                </div>
                            </div>
                            <div class="filter-group mb-4">
                                <h6 class="fw-bold">Price</h6>
                                <div class="d-flex align-items-center gap-2 mb-3">
                                    <input type="number" class="form-control" placeholder="From Vnd">
                                    <span>-</span>
                                    <input type="number" class="form-control" placeholder="To Vnd">
                                </div>
                                <button class="btn btn-veggie w-100 text-white fw-bold">Filter</button>
                            </div>
                            <div class="filter-group">
                                <h6 class="fw-bold">Product Type</h6>
                                <ul class="list-unstyled" id="sidebar-categories">
                                </ul>
                            </div>
                        </div>
                    </aside>
                    <div class="col-lg-9">
                        <div class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded shadow-sm">
                            <div class="d-flex gap-3 align-items-center">
                                <i class="fa-solid fa-grid-2 fs-5 text-success"></i>
                                <i class="fa-solid fa-list fs-5 text-muted"></i>
                                <span class="text-muted small">Showing all results</span>
                            </div>
                            <div class="d-flex align-items-center gap-2">
                                <label class="small text-muted text-nowrap">Sort by:</label>
                                <select id="sort-select" class="form-select form-select-sm border-0 bg-light">
                                    <option value="">-- Mặc định --</option>
                                    <option value="-sold_count">Bán chạy nhất</option>
                                    <option value="-average_rating">Được yêu thích nhất</option>
                                    <option value="price">Giá: Thấp đến Cao</option>
                                    <option value="-price">Giá: Cao đến Thấp</option>
                                </select>
                            </div>
                        </div>
                        <div id="product-list" class="row g-4"></div>
                        <template id="product-template">
                            <div class="col-6 col-md-4">
                                <div class="card h-100 border-0 shadow-sm product-card p-3 position-relative">
                                    <div class="position-absolute top-0 start-0 bg-danger text-white small px-2 py-1 rounded-end" style="z-index: 10;">
                                        Mã giảm giá
                                    </div>
                                    <button class="btn-action wishlist-btn position-absolute" style="top: 10px; right: 10px; z-index: 10;" title="Yêu thích" data-id="">
                                        <i class="fa-regular fa-heart"></i>
                                    </button>
                                    <div class="product-img-bg mb-2 position-relative overflow-hidden rounded text-center">
                                        <a href="#" class="product-link-detail">
                                            <img class="img-fluid" id="product-img" style="max-height: 180px; object-fit: contain;">
                                        </a>
                                        <div class="product-action-buttons d-flex justify-content-center gap-2">
                                            <button class="btn-action add-cart-btn" title="Thêm vào giỏ" data-id="">
                                                <i class="fa-solid fa-cart-shopping"></i>
                                            </button>
                                        </div>
                                    </div>
                                    <div class="card-body p-0 text-start">
                                        <a class="product-link-detail fw-bold text-dark text-decoration-none d-block mb-1">
                                            <span id="product-name" style="font-size: 0.9rem;"></span>
                                        </a>
                                        <div class="small text-muted mb-1">ĐVT: <span id="product-unit"></span>
                                            <span id="product-weightGram" class="text-muted"></span>
                                        </div>
                                        <div class="mb-2">
                                            <span class="text-success fw-bold d-block" id="product-price"></span>
                                            <small class="text-muted text-decoration-line-through">0 đ</small>
                                        </div>
                                        <div class="d-flex align-items-center justify-content-between mt-auto pt-2 border-top">
                                           <div class="d-flex align-items-center qty-container">
                                                <button class="btn btn-outline-success rounded-circle p-0 btn-minus" style="width: 25px; height: 25px;" type="button">-</button>
                                                <input type="text" class="form-control text-center border-0 bg-transparent fw-bold p-0 qty-input" value="1" style="max-width: 40px;">
                                                <button class="btn btn-success rounded-circle p-0 btn-plus" style="width: 25px; height: 25px;" type="button">+</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </template>
                        <div id="pagination" class="d-flex justify-content-center mt-4"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <div id="footer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./js/config.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/header.js"></script>
    <script src="./js/footer.js"></script>
    <script src="./js/cart.js"></script>
    <script src="js/product-detail.js"></script>
    <script src="./js/detail.js"></script>
    <script src="./js/search.js"></script>
</body>
</html>
