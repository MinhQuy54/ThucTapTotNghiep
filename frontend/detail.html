<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veggie - Demo Vegetable Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<style>
    #pagination {
        display: flex;
        gap: 8px;
        justify-content: center;
        align-items: center;
        margin-top: 20px;
    }

    /* Style chung cho các nút */
    .page-btn {
        width: 45px;
        height: 45px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid #eee;
        background-color: #fff;
        color: #333;
        font-weight: bold;
        text-decoration: none;
        transition: all 0.3s ease;
        cursor: pointer;
    }

    /* Nút đang được chọn (Active) - Màu xanh lá giống ảnh */
    .page-btn.active {
        background-color: #8cb43c;
        /* Màu xanh lá đặc trưng */
        color: white;
        border-color: #8cb43c;
    }

    /* Hiệu ứng khi di chuột qua */
    .page-btn:hover:not(.active) {
        border-color: #8cb43c;
        color: #8cb43c;
    }

    /* Style cho icon << và >> */
    .page-btn i {
        font-size: 0.9rem;
    }

    .product-image-wrapper:hover img {
        transform: scale(1.08);
    }

    .qty-container {
        border-radius: 30px;
        /* Bo tròn hoàn toàn */
        padding: 2px 8px;
    }

    .qty-container input::-webkit-outer-spin-button,
    .qty-container input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
    }

    .btn-add-to-cart {
        background-color: #89b500;
        color: #000;
        border: none;
        position: relative;
        z-index: 1;
        overflow: hidden;
        transition: color 0.4s linear;
        cursor: pointer;
        padding: 10px 20px;
        text-transform: uppercase;
        font-weight: bold;
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }

    .btn-add-to-cart:hover {
        color: #000 !important;
        border: 1px solid #000;
    }

    .btn-add-to-cart::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: #fff;
        z-index: -1;
        transition: transform 0.5s;
        transform-origin: 0 0;
        transform: scaleX(0);
        transition-timing-function: cubic-bezier(0.5, 1.6, 0.4, 1.7);
    }

    .btn-add-to-cart:hover::before {
        transform: scaleX(1);
    }

    .stock-status {
        font-size: 0.75rem;
        padding: 4px 12px;
        border-radius: 50px;
        background: #f0f9eb;
        color: #89b500;
    }
</style>

<body>

    <div id="header"></div>

    <main>
        <section class="category-banner text-white d-flex align-items-center"
            style="background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('img/backgroud-veggie.jpg') center/cover; height: 400px;">
            <div class="container d-flex justify-content-between align-items-center">
                <div>
                    <h6 class="text-success fw-bold text-uppercase small">Welcome to our store</h6>
                    <h1 id="category-title" class="display-4 fw-bold"></h1>
                </div>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-0">
                        <li class="breadcrumb-item"><a href="index.html"
                                class="text-white text-decoration-none">Home</a></li>
                        <li id="breadcrumb-category" class="breadcrumb-item active text-success fw-bold"
                            aria-current="page"></li>
                    </ol>
                </nav>
            </div>
        </section>

        <section class="py-5 bg-light">
            <div class="container">
                <div class="row">
                    <aside class="col-lg-3 ">
                        <div class="filter-sidebar bg-white p-4 rounded shadow-sm">
                            <h5 class="fw-bold mb-4 border-bottom pb-2">Filter By</h5>

                            <div class="filter-group mb-4">
                                <h6 class="fw-bold">Availability</h6>
                                <div class="form-check"><input class="form-check-input" type="checkbox"
                                        id="stock1"><label class="form-check-label" for="stock1">In Stock</label></div>
                                <div class="form-check"><input class="form-check-input" type="checkbox"
                                        id="stock2"><label class="form-check-label" for="stock2">Out of Stock</label>
                                </div>
                            </div>

                            <div class="filter-group mb-4">
                                <h6 class="fw-bold">Price</h6>
                                <div class="d-flex align-items-center gap-2 mb-3">
                                    <input type="number" class="form-control" placeholder="From Vnd">
                                    <span>-</span>
                                    <input type="number" class="form-control" placeholder="To Vnd">
                                </div>
                                <button class="btn btn-veggie w-100 text-white fw-bold">Filter</button>
                            </div>

                            <div class="filter-group">
                                <h6 class="fw-bold">Product Type</h6>
                                <ul class="list-unstyled" id="sidebar-categories">
                                </ul>
                            </div>
                        </div>
                    </aside>

                    <div class="col-lg-9">
                        <div
                            class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded shadow-sm">
                            <div class="d-flex gap-3 align-items-center">
                                <i class="fa-solid fa-grid-2 fs-5 text-success"></i>
                                <i class="fa-solid fa-list fs-5 text-muted"></i>
                                <span class="text-muted small">Showing all results</span>
                            </div>
                            <div class="d-flex align-items-center gap-2">
                                <label class="small text-muted text-nowrap">Sort by:</label>
                                <select id="sort-select" class="form-select form-select-sm border-0 bg-light">
                                    <option value="">Best Selling</option>
                                    <option value="price">Price: Low to High</option>
                                    <option value="-price">Price: High to Low</option>
                                </select>
                            </div>
                        </div>

                        <div id="product-list" class="row g-4"></div>
                        <template id="product-template">
                            <div class="col-6 col-md-4">
                                <div class="card h-100 border-0 shadow-sm product-card p-2 product-card">
                                    <div
                                        class="product-img-bg mb-3 position-relative overflow-hidden rounded bg-light p-4 text-center">
                                        <img class="img-fluid" id="product-img">
                                        <div class="product-action-buttons d-flex justify-content-center gap-2">
                                            <button class="btn-action quick-view-btn" data-id=""
                                                data-bs-target="#quickViewDetailModal" data-bs-toggle="modal"
                                                title="Xem nhanh">
                                                <i class="fa-regular fa-eye"></i>
                                            </button>
                                            <button class="btn-action add-cart-btn" title="Thêm vào giỏ" data-id="">
                                                <i class="fa-solid fa-cart-shopping"></i>
                                            </button>
                                            <button class="btn-action add-wish-btn" title="Yêu thích" data-id="">
                                                <i class="fa-regular fa-heart"></i>
                                            </button>
                                            <button class="btn-action" title="So sánh">
                                                <i class="fa-solid fa-arrows-rotate"></i>
                                            </button>
                                        </div>
                                    </div>

                                    <div class="card-body text-center">
                                        <h6 class=" text-muted small" id="category-name">
                                        </h6>
                                        <a class="fw-bold text-dark text-decoration-none" id="product-link-detail">
                                            <span id="product-name"></span>
                                        </a>
                                    </div>
                                    <div class="d-flex justify-content-center gap-2">
                                        <span class="text-success fw-bold" id="product-price"></span>
                                    </div>
                                </div>
                            </div>
                        </template>
                        <div id="pagination" class="d-flex justify-content-center mt-4"></div>
                    </div>
                </div>
            </div>
        </section>

    </main>
    <div id=""></div>
    <div id="footer"></div>

</body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="./js/config.js"></script>
<script src="./js/auth.js"></script>
<script src="./js/header.js"></script>
<script src="./js/footer.js"></script>
<script src="./js/cart.js"></script>
<script src="./js/load-modal.js"></script>
<script src="./js/detail.js"></script>
<script src="./js/product-detail.js"></script>
<script src="./js/search.js"></script>

</html>
