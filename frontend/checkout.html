<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veggie - Demo Vegetable Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<style>
    :root {
        --veggie-green: #84b800;
    }

    body {
        background-color: #f8f9fa;
        font-family: 'Inter', sans-serif;
    }

    /* Group container */
    .checkout-section {
        background: white;
        padding: 30px;
        border: 1px solid #eee;
        margin-bottom: 20px;
    }

    /* Input styling */
    .form-label {
        font-weight: 700;
        font-size: 14px;
        margin-bottom: 8px;
    }

    .input-group-text {
        background: white;
        border-left: none;
        color: var(--veggie-green);
    }

    .form-control,
    .form-select {
        border-right: none;
        padding: 12px;
        border-radius: 0;
        font-size: 14px;
    }

    /* Button Thêm địa chỉ */
    .btn-add-address {
        background-color: var(--veggie-green);
        color: white;
        border: none;
        padding: 10px 20px;
        font-weight: 700;
        text-transform: uppercase;
        font-size: 13px;
    }

    .btn-add-address:hover {
        background-color: black;
    }

    /* Cột Tổng sản phẩm (Order Summary) */
    .order-summary {
        background: white;
        padding: 20px;
    }

    .summary-row {
        display: flex;
        justify-content: space-between;
        padding: 10px 0;
        border-bottom: 1px solid #f1f1f1;
        font-size: 14px;
    }

    .summary-row.total {
        border-bottom: none;
        font-weight: 800;
        font-size: 18px;
    }

    /* Payment Method */
    .payment-methods {
        margin-top: 30px;
    }

    .payment-option {
        border: 1px solid #eee;
        padding: 15px;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
    }

    .payment-option input {
        margin-right: 15px;
    }

    .btn-save {
        background-color: #212529;
        color: white;
        border-radius: 0;
        padding: 10px 30px;
        text-transform: uppercase;
        font-weight: bold;
        font-size: 0.85rem;
        transition: 0.3s;
        border: none;
    }

    .btn-save:hover {
        background-color: var(--veggie-green);
        color: white;
    }

    /* Voucher cards */
    .voucher-card {
        border: 1.5px dashed #ccc;
        border-radius: 6px;
        padding: 10px 14px;
        margin-bottom: 8px;
        cursor: pointer;
        transition: all 0.2s ease;
        font-size: 0.82rem;
        background: #fff;
        position: relative;
    }
    .voucher-card:hover {
        border-color: #84b800;
        background: #f8ffe0;
    }
    .voucher-card.selected {
        border-color: #84b800;
        background: #f1f8e9;
    }
    .voucher-card.selected::after {
        content: '\f00c';
        font-family: 'Font Awesome 6 Free';
        font-weight: 900;
        position: absolute;
        top: 8px;
        right: 10px;
        color: #84b800;
        font-size: 0.85rem;
    }
    .voucher-card.disabled {
        opacity: 0.45;
        cursor: not-allowed;
    }
</style>

<body>
    <div id="header"></div>

    <main>
        <section class="about-header position-relative d-flex align-items-center justify-content-center text-white"
            style="background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('img/vegetarian-bg.jpeg') center/cover; height: 450px;">
            <div class="text-center">
                <h6 class="text-success fw-bold text-uppercase ls-2">Welcome to our store</h6>
                <h1 class="display-3 fw-bold">Checkout</h1>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb justify-content-center mb-0">
                        <li class="breadcrumb-item"><a href="index.html"
                                class="text-white text-decoration-none">Home</a></li>
                        <li class="breadcrumb-item active text-success" aria-current="page">Checkout</li>
                    </ol>
                </nav>
            </div>
        </section>

        <section class="py-5" style="background-color: #fff;">
            <div class="container">
                <div class="row">
                    <div class="col-lg-8">
                        <h4 class="fw-bold mb-4">Chi tiết thanh toán</h4>

                        <div class="checkout-section border p-4 mb-4">
                            <h6 class="fw-bold mb-4" style="color: #333;">Thông tin cá nhân</h6>
                            
                            <div class="mb-4">
                                <label for="address" class="form-label text-success">Chọn địa chỉ đã lưu</label>
                                <select id="address" class="form-select bg-light border-0 shadow-sm"></select>
                            </div>
                            <div class="row g-4">
                                <div class="col-md-6">
                                    <div class="input-group">
                                        <input type="text" class="form-control bg-light" value="" id="fullname" readonly>
                                        <span class="input-group-text bg-light border-start-0"><i class="fa-solid fa-user text-success"></i></span>
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <div class="input-group">
                                        <input type="text" class="form-control bg-light" value="" id="phone">
                                        <span class="input-group-text bg-light border-start-0"><i
                                                class="fa-solid fa-phone text-success"></i></span>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Địa chỉ</label>
                                    <input type="text" class="form-control bg-light border-end"
                                        style="border-right: 1px solid #dee2e6 !important;" value=""
                                        id="address-detail">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Thành phố</label>
                                    <input type="text" class="form-control bg-light border-end"
                                        style="border-right: 1px solid #dee2e6 !important;" value="" id="city">
                                </div>
                            </div>
                        </div>

                        <div class="payment-methods">
                            <h5 class="fw-bold mb-4">Phương thức thanh toán</h5>
                            <div
                                class="payment-option border p-3 mb-2 d-flex align-items-center justify-content-between">
                                <div class="form-check m-0">
                                    <input class="form-check-input" type="radio" name="payment" id="cod">
                                    <label class="form-check-label fw-bold ms-2" for="cod">Thanh toán khi nhận
                                        hàng</label>
                                </div>
                                <img src="https://cdn-icons-png.flaticon.com/512/2489/2489756.png" width="40">
                            </div>
                            <div
                                class="payment-option border p-3 mb-2 d-flex align-items-center justify-content-between">
                                <div class="form-check m-0">
                                    <input class="form-check-input" type="radio" name="payment" id="momo" checked>
                                    <label class="form-check-label fw-bold ms-2" for="paypal">Momo</label>
                                </div>
                                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQZcQPC-zWVyFOu9J2OGl0j2D220D49D0Z7BQ&s"
                                    height="25">
                            </div>
                        </div>
                    </div>

                    <div class="order-summary p-4 rounded shadow-sm border" style="background-color: #fff; margin-top: 50px;">
                        <h4 class="fw-bold mb-4 border-bottom pb-3 text-uppercase fs-5">Đơn hàng của bạn</h4>
                        
                        <div id="summary-checkout" class="mb-3"></div>
                        
                        <template id="template-checkout">
                            <div class="summary-row d-flex justify-content-between align-items-center py-3 border-bottom border-light">
                                <div class="d-flex align-items-center" style="width: 50%;">
                                    <span class="text-dark fw-medium name-checkout text-truncate"></span>
                                </div>
                                <div class="text-center" style="width: 20%;">
                                    <span class="quantity-checkout text-secondary small bg-light px-2 py-1 rounded-pill fw-bold"></span>
                                </div>
                                <div class="text-end" style="width: 30%;">
                                    <span class="fw-bold text-dark total-price-item-checkout"></span>
                                </div>
                            </div>
                        </template>

                        <div class="summary-row d-flex justify-content-between py-3 border-bottom border-light">
                            <span class="text-muted">Tạm tính</span>
                            <span id="subTotal" class="fw-bold text-dark">0 đ</span>
                        </div>

                        <div class="summary-row d-flex justify-content-between py-3 border-bottom border-light">
                            <span class="text-muted">Phí vận chuyển</span>
                            <span id="shippingFee" class="fw-bold text-primary">Đang tính...</span>
                        </div>

                        <!-- Voucher Section -->
                        <div class="py-3 border-bottom border-light">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="fw-bold small text-uppercase" style="color:#555;">Mã giảm giá</span>
                                <button id="btn-toggle-vouchers" class="btn btn-sm btn-link text-success p-0 text-decoration-none small fw-bold">
                                    <i class="fa-solid fa-ticket me-1"></i>Chọn voucher
                                </button>
                            </div>

                            <!-- Danh sách voucher có sẵn -->
                            <div id="voucher-list-checkout" style="display:none;" class="mb-2">
                                <div id="voucher-cards-loading" class="text-center py-2 text-muted small">
                                    <div class="spinner-border spinner-border-sm text-success" role="status"></div> Đang tải...
                                </div>
                                <div id="voucher-cards-container"></div>
                            </div>

                            <!-- Nhập tay -->
                            <div class="d-flex align-items-center gap-2">
                                <input type="text" id="voucher-input" class="form-control form-control-sm" 
                                    placeholder="Nhập hoặc chọn mã voucher..." style="border-radius: 0;">
                                <button id="btn-apply-voucher" class="btn btn-sm btn-outline-success fw-bold text-nowrap" 
                                    style="border-radius: 0; min-width: 90px;">Áp dụng</button>
                            </div>
                            <div id="voucher-feedback" class="small mt-1"></div>
                        </div>

                        <div class="summary-row d-flex justify-content-between py-3 border-bottom border-light" id="discount-row" style="display: none !important;">
                            <span class="text-success"><i class="fa-solid fa-tag me-1"></i>Giảm giá voucher</span>
                            <span id="discountAmount" class="fw-bold text-success">-0 đ</span>
                        </div>

                        <div class="summary-row d-flex justify-content-between align-items-center py-4 mt-3 bg-light px-3 rounded-3 border">
                            <span class="fw-bold h6 mb-0 text-uppercase" style="color: #333;">Thành tiền</span>
                            <span id="orderTotal" class="fw-bold h4 mb-0" style="color: #84b800;">0 đ</span>
                        </div>
                        
                        <button class="btn-add-address w-100 py-3 mt-4 fw-bold text-uppercase rounded-3 shadow-sm border-0" id="btn-place-order" style="background-color: #84b800; color: white; transition: 0.3s;">
                            Đặt hàng ngay
                        </button>
                    </div>

                </div>
            </div>
        </section>
    </main>
    <div id="footer"></div>


</body>

<script src="./js/config.js"></script>
<script src="./js/auth.js"></script>

<script src="./js/cart.js"></script>
<script src="./js/checkout.js"></script>

<script src="./js/footer.js"></script>
<script src="./js/header.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</html>
