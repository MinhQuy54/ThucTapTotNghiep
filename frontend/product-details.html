<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veggie - Demo Vegetable Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<style>
    :root {
        --primary-color: #78a206;
        --hover-color: #5d7c05;
    }

    body {
        font-family: 'Inter', sans-serif;
        color: #333;
    }

    .text-success {
        color: var(--primary-color) !important;
    }

    .btn-success {
        background-color: var(--primary-color);
        border-color: var(--primary-color);
    }

    .btn-success:hover {
        background-color: var(--hover-color);
    }

    .custom-tabs .nav-link {
        color: #888;
        border: none;
        border-bottom: 3px solid transparent;
    }

    .custom-tabs .nav-link.active {
        color: var(--primary-color) !important;
        border-bottom: 3px solid var(--primary-color);
        background: transparent;
    }


    .qty-input::-webkit-inner-spin-button {
        display: none;
    }

    .category-banner {
        position: relative;
        overflow: hidden;
    }
</style>

<body>

    <div id="header"></div>

    <main class="container py-4">

        <div class="row g-5">
            <div class="col-md-5">
                <div class="position-relative border rounded p-4 text-center d-flex align-items-center justify-content-center bg-white" style="height: 450px;">
                    <span class="badge bg-danger position-absolute top-0 start-0 m-3 px-2 py-1 fs-6 rounded-1">-14%</span>
                    <img id="product-img" src="img/bag-filled.png" alt="Product Image" class="img-fluid" style="max-height: 100%; object-fit: contain;">
                </div>
            </div>

            <div class="col-md-7">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <div class="text-muted small">Đã bán 0k</div>
                    <button class="btn btn-light rounded-circle text-muted p-2 border" title="Yêu thích">
                        <i class="fa-regular fa-heart"></i>
                    </button>
                </div>

                <h1 id="product-name" class="h4 fw-bold mb-2 text-dark">Đang tải tên sản phẩm...</h1>
                <div class="text-muted small mb-3" id="category">ĐVT: Hộp</div>

                <div class="p-3 rounded-3 mb-4" style="background-color: #f2f9f2;">
                    <div class="row text-muted small gy-3">
                        <div class="col-6">
                            <div>Xuất xứ</div>
                            <div class="fw-bold text-dark">Việt Nam</div>
                        </div>
                        <div class="col-6">
                            <div>VAT</div>
                            <div class="fw-bold text-dark">0%</div>
                        </div>
                        <div class="col-6">
                            <div>Thương hiệu</div>
                            <div class="fw-bold text-success">Veggie Store</div>
                        </div>
                        <div class="col-6">
                            <div>Bảo quản</div>
                            <div class="fw-bold text-dark"><i class="fa-solid fa-snowflake text-info me-1"></i>Tủ lạnh</div>
                        </div>
                    </div>
                </div>

                <div class="border rounded-3 p-4 mb-4 shadow-sm bg-white">
                    <div class="d-flex align-items-end mb-1">
                        <h2 id="product-price" class="text-success fw-bold mb-0 me-3">0đ</h2>
                        <span class="text-muted text-decoration-line-through small pb-1">32,000đ</span>
                    </div>
                    <div class="small text-muted mb-3 fst-italic">(Giá đã bao gồm VAT)</div>

                    <div class="stock-status mb-3 fw-bold small"></div>

                    <div class="d-flex gap-3 align-items-center mb-3">
                        <div class="input-group border border-success rounded-2" style="width: 140px; height: 44px;">
                            <button class="btn text-success fw-bold border-0 px-3 fs-5" type="button" onclick="changeQty(-1)">-</button>
                            <input type="text" id="qty-input" class="form-control text-center border-0 text-success fw-bold bg-transparent" value="1" readonly>
                            <button class="btn text-success fw-bold border-0 px-3 fs-5" type="button" onclick="changeQty(1)">+</button>
                        </div>
                        
                        <button class="btn btn-success flex-grow-1 fw-bold fs-6 add-cart-btn btn-add-to-cart" style="height: 44px;">
                            Thêm vào giỏ
                        </button>
                    </div>

                    <div class="small text-muted border-top pt-3 mt-3">
                        <div class="mb-2"><i class="fa-solid fa-truck text-success me-2"></i> Nhận hàng sớm nhất từ <span class="fw-bold text-dark">6h00 ngày mai</span></div>
                        <div><i class="fa-solid fa-shield-check text-success me-2"></i> Thanh toán khi giao • Miễn phí vận chuyển</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-5">
            <div class="col-md-8">
                <h4 class="fw-bold mb-3 border-bottom pb-2">Mô tả sản phẩm</h4>
                <div id="product-desc" class="text-dark" style="line-height: 1.8; text-align: justify;">
                    Đang tải mô tả...
                </div>
            </div>
        </div>
    </main>

    <div id="footer"></div>

</body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="./js/config.js"></script>
<script src="/frontend/js/auth.js"></script>
<script src="./js/header.js"></script>
<script src="./js/footer.js"></script>
<script src="./js/load-modal.js"></script>
<script src="./js/product-detail.js"></script>
<script src="./js/search.js"></script>

</html>
