<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veggie - Demo Vegetable Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<style>
    :root {
        --primary-color: #78a206;
        --hover-color: #5d7c05;
    }

    body {
        font-family: 'Inter', sans-serif;
        color: #333;
    }

    .text-success {
        color: var(--primary-color) !important;
    }

    .btn-success {
        background-color: var(--primary-color);
        border-color: var(--primary-color);
    }

    .btn-success:hover {
        background-color: var(--hover-color);
    }

    .custom-tabs .nav-link {
        color: #888;
        border: none;
        border-bottom: 3px solid transparent;
    }

    .custom-tabs .nav-link.active {
        color: var(--primary-color) !important;
        border-bottom: 3px solid var(--primary-color);
        background: transparent;
    }


    .qty-input::-webkit-inner-spin-button {
        display: none;
    }

    .category-banner {
        position: relative;
        overflow: hidden;
    }
</style>

<body>

    <div id="header"></div>

    <main>
        <section class="category-banner text-white d-flex align-items-center"
            style="background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('img/Vegetable_Background.jpg') center/cover; height: 400px;">
            <div class="container d-flex justify-content-between align-items-center">
                <div>
                    <h6 class="text-success fw-bold text-uppercase small">Welcome to our store</h6>
                    <h1 id="category-title" class="display-4 fw-bold">Chi Tiết Sản Phẩm</h1>
                </div>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-0">
                        <li class="breadcrumb-item"><a href="index.html"
                                class="text-white text-decoration-none">Home</a></li>
                        <li id="breadcrumb-category" class="breadcrumb-item active text-success fw-bold"
                            aria-current="page">Chi Tiết Sản Phẩm</li>
                    </ol>
                </nav>
            </div>
        </section>

        <section class="product-details py-5">
            <div class="container">
                <div class="row g-5">
                    <div class="col-lg-6">
                        <div class="product-image-wrapper p-4 ">
                            <img id="product-img" src="" alt="Product" class="img-fluid w-100 object-fit-contain"
                                style="max-height: 350px;">
                        </div>
                    </div>

                    <div class="col-lg-6">
                        <div class="product-info-content">
                            <div class="rating mb-2 text-warning">
                                <i class="fa-solid fa-star"></i>
                                <i class="fa-solid fa-star"></i>
                                <i class="fa-solid fa-star"></i>
                                <i class="fa-solid fa-star"></i>
                                <i class="fa-regular fa-star"></i>
                                <span class="text-muted small ms-2">(95 Reviews)</span>
                            </div>

                            <h1 id="product-name" class="fw-bold mb-3 h2"></h1>

                            <div class="price-box mb-4">
                                <span id="product-price" class="h3 fw-bold text-success"></span>
                            </div>

                            <div class="category-meta mb-4 pb-4 border-bottom">
                                <p class="mb-1" id="category"><span class="fw-bold"></span> </p>
                            </div>

                            <div class="action-wrapper d-flex align-items-center gap-3 mb-4">
                                <div class="qty-container d-flex align-items-center border rounded">
                                    <button class="qty-btn border-0 bg-transparent px-3 py-2"
                                        onclick="changeQty(-1)">-</button>
                                    <input type="number" id="qty-input" value="1" min="1"
                                        class="qty-input border-0 text-center fw-bold" style="width: 50px;">
                                    <button class="qty-btn border-0 bg-transparent px-3 py-2"
                                        onclick="changeQty(1)">+</button>
                                </div>
                                <button class="btn btn-success px-5 py-2 fw-bold d-flex align-items-center"
                                    onclick="addToCart()">
                                    <i class="fa-solid fa-cart-shopping"></i> THÊM VÀO GIỎ HÀNG
                                </button>
                            </div>

                            <div class="utility-links d-flex gap-4 mb-4 small fw-semibold text-muted">
                                <a href="#" class="text-decoration-none text-reset"><i
                                        class="fa-regular fa-heart me-1"></i> Add to Wishlist</a>
                                <a href="#" class="text-decoration-none text-reset"><i
                                        class="fa-solid fa-shuffle me-1"></i> Compare</a>
                            </div>

                            <div class="guaranteed-box  p-3 rounded bg-white">
                                <p class="small fw-bold mb-2">Guaranteed Safe Checkout</p>
                                <div class="">
                                    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg"
                                        width="30" class="me-2">
                                    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg"
                                        width="50">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row mt-5 pt-5">
                    <div class="col-12">
                        <ul class="nav nav-tabs custom-tabs" id="productTab" role="tablist">
                            <li class="nav-item">
                                <button class="nav-link active fw-bold text-uppercase py-3" data-bs-toggle="tab"
                                    data-bs-target="#desc">Description</button>
                            </li>
                            <li class="nav-item">
                                <button class="nav-link fw-bold text-uppercase py-3" data-bs-toggle="tab"
                                    data-bs-target="#reviews">Reviews</button>
                            </li>
                        </ul>
                        <div class="tab-content p-4 ">
                            <div class="tab-pane fade show active" id="desc">
                                <p class="text-muted lh-lg" id="product-desc">
                                    Praesent congue erat at massa. Sed cursus turpis vitae tortor... (Mô tả sẽ load từ
                                    API)
                                </p>
                            </div>
                            <div class="tab-pane fade" id="reviews">
                                <p>No reviews yet.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer"></div>

</body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="./js/config.js"></script>
<script src="/frontend/js/auth.js"></script>
<script src="./js/header.js"></script>
<script src="./js/footer.js"></script>
<script src="./js/load-modal.js"></script>
<script src="./js/product-detail.js"></script>
<script src="./js/search.js"></script>

</html>
