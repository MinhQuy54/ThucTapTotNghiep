<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt hàng thành công - Veggie</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Inter', sans-serif; }
        .success-container {
            background: white;
            border-radius: 15px;
            padding: 50px 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 600px;
            margin: 80px auto;
        }
        .icon-success {
            font-size: 80px;
            color: #84b800; /* Màu xanh Veggie */
            margin-bottom: 20px;
        }
        .btn-veggie-outline {
            border: 2px solid #84b800;
            color: #84b800;
            font-weight: 700;
            text-transform: uppercase;
        }
        .btn-veggie-outline:hover {
            background-color: #84b800;
            color: white;
        }
        .btn-veggie-solid {
            background-color: #84b800;
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            border: none;
        }
        .btn-veggie-solid:hover {
            background-color: #212529;
            color: white;
        }
    </style>
</head>

<body>
    <div id="header"></div>

    <main class="container">
        <div class="success-container text-center">
            <i class="fa-solid fa-circle-check icon-success"></i>
            <h1 class="fw-bold text-dark mb-3">Đặt Hàng Thành Công!</h1>
            <p class="text-muted fs-5 mb-4">Cảm ơn bạn đã mua sắm tại Veggie.<br>Đơn hàng của bạn đang được chúng tôi xử lý.</p>
            
            <div class="p-3 bg-light rounded-3 mb-4 d-inline-block">
                <span class="text-muted">Mã đơn hàng của bạn:</span>
                <span id="display-order-id" class="fw-bold fs-4 text-success ms-2">#---</span>
            </div>

            <div class="d-flex flex-column flex-sm-row justify-content-center gap-3 mt-3">
                <a href="detail.html" class="btn btn-veggie-outline px-4 py-3 rounded-3">
                    <i class="fa-solid fa-arrow-left me-2"></i>Tiếp tục mua sắm
                </a>
                <a href="account.html?tab=orders" class="btn btn-veggie-solid px-4 py-3 rounded-3 shadow-sm">
                    Xem hóa đơn<i class="fa-solid fa-file-invoice ms-2"></i>
                </a>
            </div>
        </div>
    </main>

    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/config.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/header.js"></script>
    <script src="./js/footer.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const orderId = urlParams.get('orderId');
            if (orderId) {
                document.getElementById('display-order-id').innerText = "#" + orderId;
            }
        });
    </script>
</body>
</html>
