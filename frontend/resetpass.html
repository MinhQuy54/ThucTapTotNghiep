<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veggie - Đặt Lại Mật Khẩu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/antd/4.24.13/antd.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/antd/4.24.13/antd.min.js"></script>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <div class="top-bar py-2 border-bottom">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="contact-info d-flex gap-4">
                <span><i class="fa-solid fa-location-dot text-success me-1"></i> Gò Công, Tiền Giang</span>
                <span><i class="fa-solid fa-envelope text-success me-1"></i> ngominhquy15@gmail.com</span>
            </div>
            <div class="social-links d-flex gap-3">
                <a href="https://www.facebook.com/nmq54/"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="https://www.instagram.com/mqn.054/"><i class="fa-brands fa-instagram"></i></a>
                <a href="https://github.com/MinhQuy54"><i class="fa-brands fa-github"></i></a>
            </div>
        </div>
    </div>
    <div id="header"></div>

    <main>
        <section class="about-header position-relative d-flex align-items-center justify-content-center text-white"
            style="background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('img/bg-veggie-misspass.jpeg') center/cover; height: 450px;">
            <div class="text-center">
                <h6 class="text-success fw-bold text-uppercase ls-2">Chào Mừng Đến Với Cửa Hàng</h6>
                <h1 class="display-3 fw-bold text-white">Tài Khoản</h1>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb justify-content-center mb-0">
                        <li class="breadcrumb-item"><a href="index.html" class="text-white text-decoration-none">Trang
                                Chủ</a></li>
                        <li class="breadcrumb-item active text-success" aria-current="page">Tài Khoản</li>
                    </ol>
                </nav>
            </div>
        </section>

        <section style="padding-top: 100px; padding-bottom: 100px;">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-12 col-md-6 col-lg-5">
                        <div class="text-center mb-4">
                            <h2 class="fw-bold">Đặt Lại Mật Khẩu</h2>
                            <p class="text-secondary">Vui lòng nhập mật khẩu mới của bạn</p>
                        </div>

                        <form id="resetForm">
                            <div class="mb-3">
                                <input type="password" class="form-control py-3 px-4" placeholder="Mật khẩu mới"
                                    style="border-radius: 0;" id="password" required>
                            </div>
                            <div class="mb-3">
                                <input type="password" class="form-control py-3 px-4" placeholder="Xác nhận mật khẩu"
                                    style="border-radius: 0;" id="confirm_password" required>
                            </div>

                            <div class="mb-4 d-flex align-items-center">
                                <label class="d-flex align-items-center" style="cursor: pointer;">
                                    <input type="checkbox" class="me-2" id="togglePassword">
                                    <span class=" text-secondary">Hiển thị mật khẩu</span>
                                </label>
                            </div>

                            <div class="text-center">
                                <button type="submit" class="btn btn-success w-100 py-3 fw-bold"
                                    style="background-color: #82B400; border: none; border-radius: 0;">
                                    ĐẶT LẠI MẬT KHẨU
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/footer.js"></script>
    <script src="./js/header.js"></script>
    <script src="./js/resetpass.js"></script>

    <script>
        document.getElementById('togglePassword').addEventListener('change', function () {
            const type = this.checked ? 'text' : 'password';
            document.getElementById('password').type = type;
            document.getElementById('confirm_password').type = type;
        });
    </script>
</body>

</html>
