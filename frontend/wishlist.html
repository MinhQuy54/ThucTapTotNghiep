<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veggie - Sản phẩm yêu thích</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <div id="header"></div>

    <div class="breadcrumb-area bg-light py-5 text-center">
        <div class="container">
            <h1 class="display-4 fw-bold">Danh sách yêu thích</h1>
            <div class="breadcrumb d-flex justify-content-center gap-2 mb-0">
                <a href="index.html" class="text-success text-decoration-none">Trang chủ</a>
                <span class="text-muted">/</span>
                <span class="text-muted">Yêu thích</span>
            </div>
        </div>
    </div>

    <main>
        <section class="py-5">
            <div class="container">
                <div id="product-list" class="row g-4">
                    <div class="col-12 text-center py-5">
                        <div class="spinner-border text-success"></div>
                    </div>
                </div>

                <template id="product-template">
                    <div class="col-6 col-md-4 col-lg-3">
                        <div class="card h-100 border-0 shadow-sm product-card p-3 position-relative">
                            <button class="btn-action wishlist-btn position-absolute active" style="top: 10px; right: 10px; z-index: 10;" title="Bỏ yêu thích" data-id="">
                                <i class="fa-solid fa-heart text-danger"></i>
                            </button>
                            <div class="product-img-bg mb-2 position-relative overflow-hidden rounded text-center">
                                <a href="#" class="product-link-detail">
                                    <img class="img-fluid" id="product-img" style="max-height: 180px; object-fit: contain;">
                                </a>
                                <div class="product-action-buttons d-flex justify-content-center gap-2">
                                    <button class="btn-action add-cart-btn" title="Xem chi tiết" data-id="">
                                        <i class="fa-solid fa-eye"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="card-body p-0 text-start">
                                <a class="product-link-detail fw-bold text-dark text-decoration-none d-block mb-1">
                                    <span id="product-name" style="font-size: 0.9rem;"></span>
                                </a>
                                <div class="small text-muted mb-1">ĐVT: <span id="product-unit"></span>
                                    <span id="product-weightGram" class="text-muted"></span>
                                </div>
                                <div class="mb-2">
                                    <span class="text-success fw-bold d-block" id="product-price"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </section>
    </main>

    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/header.js"></script>
    <script src="./js/wishlist.js"></script>
    <script src="./js/footer.js"></script>
</body>
</html>
