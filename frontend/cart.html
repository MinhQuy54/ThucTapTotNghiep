<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veggie - Demo Vegetable Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<style>
    .table {
        table-layout: fixed;
        width: 100%;
    }

    .qty-container {
        width: 100px;
        /* Cố định độ rộng ô số lượng */
        height: 35px;
    }

    .cart-img {
        max-height: 120px;
        object-fit: contain;
    }

    /* Tinh chỉnh input số lượng */
    .cart-qty {
        width: 30px !important;
        font-size: 14px;
    }


    #qty-input::-webkit-inner-spin-button,
    #qty-input::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
    }


    .btn-veggie-cart {
        background-color: #84b800 !important;
        color: white !important;
        border: none !important;
        border-radius: 0 !important;
        /* Nút vuông giống ảnh */
        padding: 10px 20px !important;
        /* Nhỏ lại theo yêu cầu */
        font-size: 13px !important;
        font-weight: 700 !important;
        width: auto !important;
        height: 50px;
        /* Nút tự co theo chữ */
        transition: 0.3s;
        display: inline-block;
        text-align: center;
    }

    .btn-veggie-cart:hover {
        background-color: black !important;
        opacity: 0.9;
    }

    .btn-remove-item:hover {
        color: #84b800 !important;
        opacity: 0.9;
    }

    .btn-checkout {
        width: 100% !important;
        padding: 15px !important;
    }
</style>

<body>

    <div id="header"></div>

    <main>
        <section class="about-header position-relative d-flex align-items-center justify-content-center text-white"
            style="background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url(https://staticcookist.akamaized.net/wp-content/uploads/sites/22/2018/12/vegetables.jpg) center/cover; height: 450px;">
            <div class="text-center">
                <h6 class="text-success fw-bold text-uppercase">Welcome to our store</h6>
                <h1 class="display-3 fw-bold">Your shopping cart</h1>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb justify-content-center mb-0">
                        <li class="breadcrumb-item"><a href="index.html"
                                class="text-white text-decoration-none">Home</a></li>
                        <li class="breadcrumb-item active text-success" aria-current="page">Cart</li>
                    </ol>
                </nav>
            </div>
        </section>

        <section class="py-lg-5">
            <div class="container">
                <div class="table-responsive mb-4">
                    <div class="table-responsive mb-4">
                        <table class="table align-middle border-top border-bottom" style="min-width: 800px;">
                            <tbody id="cart-item">
                            </tbody>
                        </table>

                        <template id="template-cart">
                            <tr style="height: 150px;">
                                <td style="width: 150px;">
                                    <img src="" alt="" class="img-fluid cart-img">
                                </td>
                                <td style="width: 250px;">
                                    <div class="fw-bold cart-name">name</div>
                                </td>
                                <td class="fw-bold text-center cart-price" style="width: 150px;">$0.00</td>
                                <td style="width: 200px;">
                                    <div class="action-wrapper d-flex justify-content-center">
                                        <div class="qty-container d-flex align-items-center border bg-white shadow-sm">
                                            <button class="btn btn-link text-decoration-none text-dark px-2 btn-minus">
                                                <i class="fas fa-minus fa-xs"></i>
                                            </button>
                                            <input type="number" value="1" min="1"
                                                class="form-control border-0 text-center fw-bold bg-transparent p-0 cart-qty">
                                            <button class="btn btn-link text-decoration-none text-dark px-2 btn-plus">
                                                <i class="fas fa-plus fa-xs"></i>
                                            </button>
                                        </div>
                                    </div>
                                </td>
                                <td class="fw-bold text-center total-price-item" style="width: 150px;">$0.00</td>
                                <td class="text-center" style="width: 50px;">
                                    <button class="btn btn-sm text-dark border-0 btn-remove-item" data-id="">
                                        <i class="fa-solid fa-xmark"></i>
                                    </button>
                                </td>
                            </tr>
                        </template>
                    </div>
                </div>

                <div class="d-flex flex-wrap gap-2 mb-5">
                    <button class="btn-veggie-cart text-uppercase">Update Cart</button>
                    <button class="btn-veggie-cart text-uppercase">
                        <a href="detail.html" class="text-decoration-none text-white">Continue Shopping</a>
                    </button>
                    <button class="btn-veggie-cart text-uppercase remove-all-item">Clear Cart</button>
                </div>

                <div class="row g-5">
                    <div class="col-md-6">
                        <h5 class="fw-bold mb-3">Get shipping estimates</h5>
                        <select class="form-select mb-3 border-light-subtle py-2 rounded-0 shadow-none">
                            <option>---</option>
                        </select>
                        <input type="text" class="form-control mb-3 border-light-subtle py-2 rounded-0 shadow-none"
                            placeholder="Zip/Postal Code">
                        <button class="btn-veggie-cart text-uppercase">Calculate shipping</button>
                    </div>

                    <div class="col-md-6">
                        <h5 class="fw-bold mb-3">Cart Totals</h5>
                        <div class="border">
                            <div class="d-flex justify-content-between p-3 border-bottom bg-light bg-opacity-10">
                                <span class="text-muted">Subtotal</span>
                                <span class="total-price">$110.00</span>
                            </div>
                            <div class="d-flex justify-content-between p-3">
                                <span class="fw-bold">Total</span>
                                <span class="fw-bold total-price">$110.00</span>
                            </div>
                        </div>
                        <a href="checkout.html"
                            class=" btn-veggie-cart btn-checkout text-uppercase mt-3 text-decoration-none text-white">Proceed
                            to Checkout</a>
                    </div>
                </div>
        </section>
    </main>

    <div id="footer"></div>
</body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="./js/config.js"></script>
<script src="./js/auth.js"></script>
<script src="./js/footer.js"></script>
<script src="./js/cart.js"></script>
<script src="./js/header.js"></script>
<script src="./js/search.js"></script>

</html>
