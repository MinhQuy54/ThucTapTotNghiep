<div class="relative w-full h-full min-h-[300px]" x-data="{ id: $id('chart-pie') }">
    <canvas 
        :id="id"
        data-chart='pie'
        data-data='{{ data|safe }}'
    ></canvas>
</div>

<script>
    (function() {
        const initChart = () => {
            const canvasses = document.querySelectorAll('canvas[data-chart="pie"]');
            canvasses.forEach(el => {
                if (el.chartInstance) return;
                
                const data = JSON.parse(el.getAttribute("data-data"));
                
                el.chartInstance = new Chart(el, {
                type: 'pie',
                data: data,
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            position: 'bottom',
                            labels: {
                                padding: 20,
                                usePointStyle: true,
                                font: {
                                    size: 12
                                }
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0, 0, 0, 0.8)',
                            padding: 12,
                            borderRadius: 8
                        }
                    }
                }
            });
        };

        if (document.readyState === "complete") {
            initChart();
        } else {
            window.addEventListener("load", initChart);
        }
    })();
</script>
