client_max_body_size 20M;
server {
    listen 80;
    server_name localhost;

    # 1. FRONTEND
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        add_header Cache-Control 'no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0';
    }

    # 2. DJANGO ADMIN & STATIC (CSS/JS của Admin)
    location ~ ^/(admin|static|media)/ {
        proxy_pass http://django:8000;
        proxy_set_header Host $host:8080;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }git add nginx/nginx.conf

    # 3. DJANGO ALLAUTH (Google OAuth callback/login)
    location /accounts/ {
        proxy_pass http://django:8000;
        proxy_set_header Host $host:8080;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. .NET APIs (Dành cho các nghiệp vụ thương mại)
    location ~ ^/api/(product|category|cart|shippingAddress|GhnShipping|checkout) {
        proxy_pass http://dotnet:7132;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ ^/(swagger)/ {   
        proxy_pass http://dotnet:7132;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 5. DJANGO APIs (Auth, User, Profile)
    location /api/ {
        proxy_pass http://django:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 6. FastAPI
    location /api/chat/ {
        proxy_pass http://rag_api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        add_header X-Accel-Buffering no;
    }
}
